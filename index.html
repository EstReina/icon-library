<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Icon Library</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="top">
    <input id="q" placeholder="Buscar por nombre (ej: airplane, alphabet-a)" />
    <select id="style"></select>
    <select id="category"></select>
    <label class="colorWrap" title="Color de iconos (Line)">
  <span>Color</span>
  <input id="color" type="color" value="#EAF2FF" />
</label>
    <span id="count"></span>
  </header>

  <main id="grid" class="grid"></main>

  <template id="cardTpl">
    <article class="card">
      <div class="preview"></div>
      <div class="meta">
        <div class="name"></div>
        <div class="sub"></div>
      </div>
      <div class="actions">
        <button class="copySvg">Copiar SVG</button>
        <button class="copyUrl">Copiar URL</button>
        <a class="open" target="_blank" rel="noreferrer">Abrir</a>
      </div>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
